name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Publish self-contained
        run: >
          dotnet publish RC-Connector.csproj -c Release -r win-x64
          --self-contained
          -o publish-folder

      - name: Install NSIS
        run: choco install nsis -y

      - name: Build NSIS installer
        run: '& "${env:ProgramFiles(x86)}\NSIS\makensis.exe" installer.nsi'

      - name: Rename installer
        run: mv RC-Connector-Setup.exe RC-Connector-${{ github.ref_name }}-Setup.exe

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: RC-Connector-${{ github.ref_name }}-Setup.exe
          generate_release_notes: true
