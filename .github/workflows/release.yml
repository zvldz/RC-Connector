name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Publish self-contained
        run: >
          dotnet publish RC-Connector.csproj -c Release -r win-x64
          --self-contained
          -o publish-folder

      - name: Install NSIS
        run: choco install nsis -y

      - name: Extract version from csproj
        id: version
        run: |
          $xml = [xml](Get-Content RC-Connector.csproj)
          $ver = $xml.Project.PropertyGroup.Version
          echo "VERSION=$ver" >> $env:GITHUB_OUTPUT

      - name: Build NSIS installer
        run: '& "${env:ProgramFiles(x86)}\NSIS\makensis.exe" /DVERSION=${{ steps.version.outputs.VERSION }} installer.nsi'

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: RC-Connector-Setup.exe
          generate_release_notes: true
